name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build prototype V1
        run: npx vite build --config vite.config.v1.js --base=/kamleon-proto/prototype/ --outDir=gh-pages/prototype

      - name: Build prototype V2
        run: npx vite build --config vite.config.v2.js --base=/kamleon-proto/prototype-v2/ --outDir=gh-pages/prototype-v2

      - name: Build Storybook
        run: npx storybook build --output-dir gh-pages/storybook

      - name: Assemble site
        run: |
          cp landing.html gh-pages/index.html
          cp -r fonts gh-pages/fonts
          touch gh-pages/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
